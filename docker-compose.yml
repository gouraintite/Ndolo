services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ndolo_dev
      POSTGRES_USER: ndolo
      POSTGRES_PASSWORD: ndolo_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndolo -d ndolo_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/Ndolo.Api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=ndolo_dev;Username=ndolo;Password=ndolo_secret"
      Jwt__Secret: "CHANGE_ME_IN_PRODUCTION_USE_A_LONG_RANDOM_STRING"
      Jwt__Issuer: ndolo-api
      Jwt__Audience: ndolo-client
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  pgdata:
